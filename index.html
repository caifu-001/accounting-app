<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云端记账系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f4f5f7; }
    .hidden { display: none !important; }

    .auth-box {
      max-width: 400px; margin: 4rem auto; padding: 2rem;
      background: white; border-radius: 1rem; box-shadow: 0 2px 10px #00000010;
    }
    .auth-title { font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; margin-bottom: 0.5rem; }
    .form-input {
      width: 100%; padding: 0.8rem; border: 1px solid #ddd;
      border-radius: 0.5rem; font-size: 1rem;
    }
    .btn {
      width: 100%; padding: 0.8rem; border-radius: 0.5rem;
      border: none; cursor: pointer; font-weight: bold; margin-top: 0.5rem;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .text-center { text-align: center; margin-top: 1rem; }
    .link { color: #4f46e5; cursor: pointer; }
    .error { color: red; font-size: 0.9rem; text-align: center; margin-top: 0.5rem; }

    .navbar { background: #4f46e5; color: white; padding: 1rem; position: sticky; top: 0; }
    .nav-tabs { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .nav-tab { background: none; border: none; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
    .nav-tab.active { background: white; color: #4f46e5; font-weight: bold; }
    .container { max-width: 1000px; margin: 0 auto; padding: 1rem; }
    .card { background: white; padding: 1.5rem; border-radius: 0.8rem; margin-bottom: 1rem; }
    .transaction-item {
      display: flex; justify-content: space-between;
      padding: 1rem; background: #f9fafb; border-radius: 0.5rem; margin-bottom: 0.5rem;
    }
    .modal {
      position: fixed; inset: 0; background: #0006;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-content { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 450px; }
    .fab {
      position: fixed; right: 2rem; bottom: 2rem;
      width: 3.5rem; height: 3.5rem; border-radius: 50%;
      background: #4f46e5; color: white; font-size: 1.5rem; border: none;
    }
    .category-btn {
      padding: 0.7rem; border: 2px solid #eee;
      border-radius: 0.5rem; cursor: pointer; background: white;
    }
    .category-btn.selected { border-color: #4f46e5; background: #eef2ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; margin: 1rem 0; }
    .stats { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .stat { flex:1; background: white; padding: 1rem; border-radius: 0.8rem; min-width: 180px; }
  </style>
</head>
<body>

<!-- 登录 -->
<div id="auth-page">
  <div class="auth-box" id="login-form">
    <div class="auth-title">登录</div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="login_user">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" class="form-input" id="login_pwd">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
    <div class="text-center">
      <span class="link" onclick="showReg()">去注册</span>
    </div>
    <div class="error" id="login_err"></div>
  </div>

  <div class="auth-box hidden" id="reg-form">
    <div class="auth-title">注册</div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="reg_user">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" class="form-input" id="reg_pwd">
    </div>
    <button class="btn btn-primary" onclick="doRegister()">注册</button>
    <button class="btn btn-secondary" onclick="showLogin()">返回登录</button>
    <div class="error" id="reg_err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app" class="hidden">
  <div class="navbar">
    <div style="display:flex;justify-content:space-between">
      <h3>💰 云端记账系统</h3>
      <div>
        <span id="nickname"></span>
        <button onclick="logout()" style="background:none;border:none;color:white;margin-left:0.5rem">退出</button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="overview">概览</button>
      <button class="nav-tab" data-page="records">记账记录</button>
      <button class="nav-tab" data-page="category">分类管理</button>
      <button class="nav-tab" data-page="admin" id="admin_tab">用户审核</button>
    </div>
  </div>

  <div class="container">
    <section id="overview">
      <div class="stats">
        <div class="stat">收入：<span id="income">0</span></div>
        <div class="stat">支出：<span id="expense">0</span></div>
        <div class="stat">结余：<span id="balance">0</span></div>
      </div>
      <div class="card">
        <h4>最近记录</h4>
        <div id="recent_list"></div>
      </div>
    </section>

    <section id="records" class="hidden">
      <button class="btn btn-primary" style="width:auto" onclick="openModal()">添加记录</button>
      <div id="record_list" style="margin-top:1rem"></div>
    </section>

    <section id="category" class="hidden">
      <div class="card">
        <h4>自定义分类</h4>
        <div style="display:flex;gap:0.5rem;margin:1rem 0">
          <input class="form-input" id="cat_name" placeholder="分类名">
          <select id="cat_type" class="form-input">
            <option value="income">收入</option>
            <option value="expense">支出</option>
          </select>
          <button class="btn btn-primary" style="width:auto" onclick="addCategory()">添加</button>
        </div>
        <div id="cat_list"></div>
      </div>
    </section>

    <section id="admin" class="hidden">
      <div class="card">
        <h4>用户审核</h4>
        <div id="user_list"></div>
      </div>
    </section>
  </div>

  <button class="fab" onclick="openModal()">+</button>

  <div class="hidden" id="modal">
    <div class="modal-content">
      <h3>添加记录</h3>
      <div style="display:flex;gap:0.5rem;margin:1rem 0">
        <button class="btn" onclick="setTransType('expense')">支出</button>
        <button class="btn" onclick="setTransType('income')">收入</button>
      </div>
      <input class="form-input" type="number" placeholder="金额" id="amount">
      <div class="grid" id="cat_grid"></div>
      <input class="form-input" type="date" id="trans_date">
      <input class="form-input" placeholder="备注" id="note">
      <button class="btn btn-primary" onclick="saveTrans()">保存</button>
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 关键修复：变量名不冲突，正常初始化
const sb = supabase.createClient(
  "https://nvqqfmvtyqzxxcgoeriv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52cXFmbXZ0eXF6eHhjZ29lcml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTAyODIsImV4cCI6MjA4OTg2NjI4Mn0.PoZYNU7ShemdTA_HCAK3Sp9t2OfswFI9ttmsVeE98T0"
);

let currentUser = null;
let transType = "expense";
let selectedCat = null;

// 页面切换
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('#overview, #records, #category, #admin').forEach(s => s.classList.add('hidden'));
    document.getElementById(tab.dataset.page).classList.remove('hidden');
  };
});

function showReg() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('reg-form').classList.remove('hidden');
}
function showLogin() {
  document.getElementById('reg-form').classList.add('hidden');
  document.getElementById('login-form').classList.remove('hidden');
}

// 注册
async function doRegister() {
  const username = document.getElementById('reg_user').value.trim();
  const password = document.getElementById('reg_pwd').value.trim();
  const err = document.getElementById('reg_err');
  if (!username || !password) { err.textContent = '请填写完整'; return; }

  const { data: exists } = await sb.from('users').select('*').eq('username', username);
  if (exists.length > 0) { err.textContent = '用户已存在'; return; }

  await sb.from('users').insert([{ username, password, role: 'user', status: 'pending' }]);
  alert('注册成功，请等待管理员审核');
  showLogin();
}

// 登录
async function doLogin() {
  const username = document.getElementById('login_user').value.trim();
  const password = document.getElementById('login_pwd').value.trim();
  const err = document.getElementById('login_err');
  if (!username || !password) { err.textContent = '请输入账号密码'; return; }

  const { data, error } = await sb.from('users')
    .select('*')
    .eq('username', username)
    .eq('password', password);

  if (error || data.length === 0) { err.textContent = '账号或密码错误'; return; }

  const user = data[0];
  if (user.status !== 'approved') { err.textContent = '账号未审核'; return; }

  currentUser = user;
  document.getElementById('auth-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('nickname').textContent = currentUser.username;

  if (user.role === 'admin') {
    document.getElementById('admin_tab').classList.remove('hidden');
  }

  loadAll();
}

function logout() {
  currentUser = null;
  document.getElementById('auth-page').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('admin_tab').classList.add('hidden');
}

// 管理员审核
async function loadAdmin() {
  const { data } = await sb.from('users').select('*');
  const html = data.map(u => `
    <div class="transaction-item">
      <span>${u.username} (${u.role}) ${u.status}</span>
      ${u.status === 'pending' ? `<button onclick="approve('${u.username}')">通过</button>` : ''}
    </div>
  `).join('');
  document.getElementById('user_list').innerHTML = html;
}

async function approve(username) {
  await sb.from('users').update({ status: 'approved' }).eq('username', username);
  loadAdmin();
}

// 分类
async function addCategory() {
  const name = document.getElementById('cat_name').value.trim();
  const type = document.getElementById('cat_type').value;
  if (!name) return;
  await sb.from('categories').insert([{ username: currentUser.username, type, name }]);
  loadCategory();
}

async function loadCategory() {
  const { data } = await sb.from('categories').select('*').eq('username', currentUser.username);
  const income = data.filter(c => c.type === 'income');
  const expense = data.filter(c => c.type === 'expense');
  document.getElementById('cat_list').innerHTML = `
    <div>收入分类：${income.map(i=>i.name).join('、')}</div>
    <div>支出分类：${expense.map(i=>i.name).join('、')}</div>
  `;
  refreshCatGrid();
}

function setTransType(t) {
  transType = t;
  refreshCatGrid();
}

async function refreshCatGrid() {
  const { data } = await sb.from('categories').select('*')
    .eq('username', currentUser.username)
    .eq('type', transType);
  document.getElementById('cat_grid').innerHTML = data.map(c => `
    <button class="category-btn" onclick="selectCat(this,'${c.name}')">${c.name}</button>
  `).join('');
}

function selectCat(el, name) {
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedCat = name;
}

// 记账
function openModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('trans_date').valueAsDate = new Date();
  refreshCatGrid();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function saveTrans() {
  const amount = Number(document.getElementById('amount').value);
  const date = document.getElementById('trans_date').value;
  const note = document.getElementById('note').value;
  if (!amount || !selectedCat) return;

  await sb.from('transactions').insert([{
    username: currentUser.username,
    type: transType,
    amount,
    date,
    note,
    category: selectedCat
  }]);
  closeModal();
  loadAll();
}

// 数据加载
async function loadAll() {
  loadOverview();
  loadRecords();
  loadCategory();
  if (currentUser.role === 'admin') loadAdmin();
}

async function loadOverview() {
  const { data } = await sb.from('transactions').select('*').eq('username', currentUser.username);
  const income = data.filter(t=>t.type==='income').reduce((s,i)=>s+i.amount,0);
  const expense = data.filter(t=>t.type==='expense').reduce((s,i)=>s+i.amount,0);
  document.getElementById('income').textContent = income;
  document.getElementById('expense').textContent = expense;
  document.getElementById('balance').textContent = income - expense;

  const recent = data.slice(-5).reverse();
  document.getElementById('recent_list').innerHTML = recent.map(t => `
    <div class="transaction-item">
      <span>${t.date} ${t.category}</span>
      <span>${t.type === 'income' ? '+' : '-' }${t.amount}</span>
    </div>
  `).join('');
}

async function loadRecords() {
  const { data } = await sb.from('transactions').select('*').eq('username', currentUser.username);
  document.getElementById('record_list').innerHTML = data.reverse().map(t => `
    <div class="transaction-item">
      <span>${t.date} ${t.category}</span>
      <span>${t.note || ''}</span>
      <span>${t.type === 'income' ? '+' : '-' }${t.amount}</span>
    </div>
  `).join('');
}
</script>
</body>
</html>
