<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧记账系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Microsoft YaHei,sans-serif;background:#f5f7fa}
    .hidden{display:none!important}
    .auth-card{max-width:400px;margin:5rem auto;padding:2rem;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .auth-title{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:1.5rem}
    .form-control{width:100%;padding:.8rem;border:1px solid #e0e6ed;border-radius:8px;margin-bottom:1rem}
    .btn{width:100%;padding:.9rem;border-radius:8px;border:none;font-weight:700;cursor:pointer}
    .btn-primary{background:#4f46e5;color:#fff}
    .btn-secondary{background:#f1f3f6;margin-top:.5rem}
    .btn-sm{padding:.5rem .8rem;width:auto}
    .btn-danger{background:#ef4444;color:#fff}
    .link{text-align:center;margin-top:1rem;color:#4f46e5;cursor:pointer}
    .err{color:red;font-size:.9rem;text-align:center;margin-top:.5rem}
    .navbar{background:#4f46e5;color:#fff;padding:1rem;position:sticky;top:0;z-index:9}
    .nav-top{display:flex;justify-content:space-between;align-items:center}
    .nav-tabs{display:flex;gap:.6rem;margin-top:.8rem;flex-wrap:wrap}
    .nav-tab{background:rgba(255,255,255,.15);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer}
    .nav-tab.active{background:#fff;color:#4f46e5;font-weight:700}
    .container{max-width:1000px;margin:0 auto;padding:1rem}
    .card{background:#fff;border-radius:12px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.6rem;margin:1rem 0}
    .category-item{padding:.8rem;border-radius:8px;text-align:center;border:2px solid #f1f1f1;cursor:pointer;background:#fff}
    .category-item.selected{border-color:#4f46e5;background:#eef2ff}
    .category-item i{font-size:1.2rem;margin-bottom:.3rem}
    .income-color{color:#10b981}
    .expense-color{color:#ef4444}
    .chart-box{height:260px;margin:1rem 0}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}
    .stat-card{background:#fff;padding:1rem;border-radius:10px;text-align:center}
    .stat-card .num{font-size:1.2rem;font-weight:700;margin-top:.3rem}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99}
    .modal-body{background:#fff;padding:2rem;border-radius:12px;width:90%;max-width:450px}
    .fab{position:fixed;right:2rem;bottom:2rem;width:3.5rem;height:3.5rem;border-radius:50%;background:#4f46e5;color:#fff;font-size:1.4rem;border:none;cursor:pointer}
    select.form-control{appearance:auto}
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-card" id="loginCard">
    <div class="auth-title">登录</div>
    <input class="form-control" id="loginUser" placeholder="用户名">
    <input type="password" class="form-control" id="loginPwd" placeholder="密码">
    <button class="btn btn-primary" onclick="login()">登录</button>
    <div class="link" onclick="showReg()">没有账号？去注册</div>
    <div class="err" id="loginErr"></div>
  </div>

  <div class="auth-card hidden" id="regCard">
    <div class="auth-title">注册</div>
    <input class="form-control" id="regUser" placeholder="用户名">
    <input type="password" class="form-control" id="regPwd" placeholder="密码">
    <button class="btn btn-primary" onclick="register()">注册</button>
    <button class="btn-secondary" onclick="showLogin()">返回登录</button>
    <div class="err" id="regErr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="navbar">
    <div class="nav-top">
      <h3>💰 记账管理系统</h3>
      <div>
        <span id="userName"></span>
        <button onclick="logout()" style="background:none;border:none;color:#fff;margin-left:.5rem">退出</button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('overview')">📊 概览</button>
      <button class="nav-tab" onclick="switchPage('records')">📝 记账</button>
      <button class="nav-tab" onclick="switchPage('category')">🗂️ 分类</button>
      <button class="nav-tab" onclick="switchPage('charts')">📈 图表</button>
      <button class="nav-tab hidden" id="adminTab" onclick="switchPage('adminPage')">👤 用户管理</button>
    </div>
  </div>

  <div class="container">
    <section id="overview">
      <div class="stat-row">
        <div class="stat-card"><div>收入</div><div class="num income-color" id="totalIncome">0</div></div>
        <div class="stat-card"><div>支出</div><div class="num expense-color" id="totalExpense">0</div></div>
        <div class="stat-card"><div>结余</div><div class="num" id="totalBalance">0</div></div>
      </div>
      <div class="card"><h4>最近记录</h4><div id="recentList"></div></div>
    </section>

    <section id="records" class="hidden">
      <button class="btn btn-primary btn-sm" onclick="openModal()">➕ 记账</button>
      <div class="card" style="margin-top:1rem" id="recordList"></div>
    </section>

    <section id="category" class="hidden">
      <div class="card">
        <h4>分类管理</h4>
        <div style="display:flex;gap:.5rem;margin:1rem 0">
          <input class="form-control" id="catName" placeholder="分类名">
          <select class="form-control" id="catType"><option value="income">收入</option><option value="expense">支出</option></select>
          <button class="btn btn-primary btn-sm" onclick="addCategory()">添加</button>
        </div>
        <div id="catList"></div>
      </div>
    </section>

    <section id="charts" class="hidden">
      <div class="card"><h4>支出构成</h4><div class="chart-box"><canvas id="pieChart"></canvas></div></div>
      <div class="card"><h4>月度趋势</h4><div class="chart-box"><canvas id="barChart"></canvas></div></div>
    </section>

    <section id="adminPage" class="hidden">
      <div class="card">
        <h4>👤 用户管理</h4>
        <div style="display:flex;gap:.5rem;margin:1rem 0">
          <input class="form-control" id="newUser" placeholder="用户名">
          <input class="form-control" id="newPwd" placeholder="密码">
          <button class="btn btn-primary btn-sm" onclick="adminAddUser()">添加用户</button>
        </div>
        <div id="allUsers"></div>
      </div>

      <div class="card">
        <h4>📄 所有用户账单</h4>
        <div id="allRecords"></div>
      </div>
    </section>
  </div>

  <button class="fab" onclick="openModal()">➕</button>

  <div class="hidden" id="modal">
    <div class="modal-body">
      <h3>记账</h3>
      <div style="display:flex;gap:.5rem;margin:1rem 0">
        <button class="btn btn-sm" id="tExp" onclick="setType('expense')">支出</button>
        <button class="btn btn-sm" id="tInc" onclick="setType('income')">收入</button>
      </div>
      <input class="form-control" type="number" id="amount" placeholder="金额">
      <div class="grid" id="catSel"></div>
      <input class="form-control" type="date" id="tdate">
      <input class="form-control" id="note" placeholder="备注">
      <button class="btn btn-primary" onclick="saveRecord()">保存</button>
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://nvqqfmvtyqzxxcgoeriv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52cXFmbXZ0eXF6eHhjZ29lcml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTAyODIsImV4cCI6MjA4OTg2NjI4Mn0.PoZYNU7ShemdTA_HCAK3Sp9t2OfswFI9ttmsVeE98T0"
);

// 🌟 核心修改：使用 localStorage 持久化存储
let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
let ttype = "expense";
let selectedCat;
let pie, bar;

const defaultCats = {
  income: [
    {name:"工资",icon:"bi-wallet2"},{name:"奖金",icon:"bi-trophy"},{name:"兼职",icon:"bi-briefcase"},
    {name:"理财",icon:"bi-graph-up"},{name:"红包",icon:"bi-gift"}
  ],
  expense: [
    {name:"餐饮",icon:"bi-cup-hot"},{name:"交通",icon:"bi-bus-front"},{name:"购物",icon:"bi-bag"},
    {name:"娱乐",icon:"bi-controller"},{name:"医疗",icon:"bi-heart-pulse"},{name:"教育",icon:"bi-book"},
    {name:"住房",icon:"bi-house"},{name:"通讯",icon:"bi-phone"}
  ]
};

// 🌟 修复：页面加载时自动检查登录状态
window.onload = function() {
  if (currentUser) {
    auth.classList.add("hidden");
    app.classList.remove("hidden");
    userName.innerText = currentUser.username;
    if(currentUser.role==="admin")adminTab.classList.remove("hidden");
    initCats();
    loadAll();
  } else {
    // 没有登录信息，显示登录页
    auth.classList.remove("hidden");
    app.classList.add("hidden");
  }
};

function switchPage(page) {
  document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  if(page === "charts") renderCharts();
  if(page === "adminPage") loadAdmin();
}

function showReg(){loginCard.classList.add("hidden");regCard.classList.remove("hidden")}
function showLogin(){regCard.classList.add("hidden");loginCard.classList.remove("hidden")}

async function register(){
  const u=regUser.value.trim(),p=regPwd.value.trim();
  if(!u||!p)return regErr.innerText="请填写完整";
  const {data}=await sb.from("users").select("*").eq("username",u);
  if(data.length)return regErr.innerText="已存在";
  await sb.from("users").insert([{username:u,password:p,status:"pending"}]);
  alert("注册成功，等待审核");
  showLogin();
}

async function login(){
  const u=loginUser.value.trim(),p=loginPwd.value.trim();
  const {data}=await sb.from("users").select("*").eq("username",u).eq("password",p);
  if(!data.length)return loginErr.innerText="账号或密码错误";
  const user=data[0];
  if(user.status!=="approved")return loginErr.innerText="未审核";
  
  // 🌟 核心修改：登录成功后存入 localStorage
  currentUser = user;
  localStorage.setItem('currentUser', JSON.stringify(user));
  
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  userName.innerText=user.username;
  if(user.role==="admin")adminTab.classList.remove("hidden");
  initCats();
  loadAll();
}

// 🌟 修复：退出时清除 localStorage
function logout(){
  localStorage.removeItem('currentUser');
  currentUser = null;
  location.reload();
}

async function initCats(){
  const {data}=await sb.from("categories").select("*").eq("username",currentUser.username);
  if(data.length)return;
  const arr=[];
  defaultCats.income.forEach(c=>arr.push({username:currentUser.username,type:"income",name:c.name,icon:c.icon}));
  defaultCats.expense.forEach(c=>arr.push({username:currentUser.username,type:"expense",name:c.name,icon:c.icon}));
  await sb.from("categories").insert(arr);
}

function setType(t){
  ttype=t;
  loadCatSel();
}

async function loadCatSel(){
  const {data}=await sb.from("categories").select("*").eq("username",currentUser.username).eq("type",ttype);
  catSel.innerHTML=data.map(c=>`
    <div class="category-item" onclick="selCat(this,'${c.name}')">
      <i class="${c.icon} ${ttype==='income'?'income-color':'expense-color'}"></i>
      <div>${c.name}</div>
    </div>
  `).join("");
}

function selCat(el,name
